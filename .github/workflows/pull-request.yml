name: pull-request
run-name: Check PR on branch "${{ github.head_ref }}"
on:
  workflow_dispatch:
  pull_request:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Get version
        id: get_version
        run: echo "version=$(sed -n 's/^version=//p' gradle.properties)" >> $GITHUB_OUTPUT

  tests:
    needs:
      - prepare
    uses: ./.github/workflows/tests.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  docker:
    needs:
      - prepare
      - tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      ORG_GRADLE_PROJECT_version: ${{ needs.prepare.outputs.version }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"
      - name: Build Bundle
        run: ./gradlew connector:buildConfluentBundle
      - name: Build Strimzi Image (no push)
        # Verify the image builds on PRs without publishing it.
        uses: littlehorse-enterprises/publish-image@v1
        with:
          image-name: strimzi
          dockerfile: docker/Dockerfile.strimzi
          github-token: ${{ secrets.GITHUB_TOKEN }}
          push: false
          tags: |
            type=raw,value=${{ env.VERSION }}
