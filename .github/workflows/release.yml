name: release
run-name: Release "${{ github.ref_name }}"
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      prerelease: ${{ steps.set_version.outputs.prerelease }}
    steps:
      - name: Set version
        id: set_version
        run: |
          VERSION="$(echo $GITHUB_REF | sed -n 's/refs\/tags\/v//p')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Mark SemVer pre-releases (e.g. 1.2.0-rc1) as GitHub pre-releases.
          if printf '%s' "$VERSION" | grep -q -- '-'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

  tests:
    needs:
      - prepare
    uses: ./.github/workflows/tests.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  release:
    needs:
      - prepare
      - tests
    runs-on: ubuntu-latest
    env:
      ORG_GRADLE_PROJECT_version: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"
      - name: Build Bundle
        run: ./gradlew connector:buildConfluentBundle
      - name: Generate a Changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose --current
        env:
          OUTPUT: CHANGELOG.md
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file CHANGELOG.md \
            --prerelease="$PRERELEASE" \
            connector/build/dist/lh-kafka-connect-"$VERSION".zip
