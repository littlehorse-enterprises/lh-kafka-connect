plugins {
    id "com.diffplug.spotless"
}

allprojects{
    apply plugin: "com.diffplug.spotless"
    apply plugin: "java"

    java {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    repositories {
        mavenCentral()
        maven {
            url = "https://packages.confluent.io/maven/"
        }
    }

    spotless {
        java {
            removeUnusedImports()
            palantirJavaFormat().style("AOSP")
        }
    }
}

tasks.register("generateDotEnv") {
    description = "Generates a .env file for docker-compose from gradle.properties"
    def dotEnv = file(".env")
    inputs.property("confluentVersion", confluentVersion)
    inputs.property("lhVersion", lhVersion)
    outputs.file(dotEnv)
    doLast {
        dotEnv.text = """\
            # Generated by the 'generateDotEnv' Gradle task. Do not edit; change versions in gradle.properties.
            CONFLUENT_VERSION=${confluentVersion}
            LITTLEHORSE_VERSION=${lhVersion}
            """.stripIndent()
    }
}

tasks.register("dockerComposeUp", Exec) {
    description = "Starts docker-compose"
    dependsOn "generateDotEnv"
    commandLine "docker", "compose", "up", "-d"
}

tasks.register("dockerComposeDown", Exec) {
    description = "Stops docker-compose"
    dependsOn "generateDotEnv"
    commandLine "docker", "compose", "down", "-v"
}
