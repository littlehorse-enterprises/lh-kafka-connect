name: tests
run-name: Test branch "${{ github.head_ref }}"
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

env:
  ORG_GRADLE_PROJECT_version: ${{ inputs.version }}

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"
      - name: Format
        run: ./gradlew spotlessCheck

  tests:
    runs-on: ubuntu-latest
    needs:
      - format
    strategy:
      matrix:
        java-version: [ "17", "21", "25" ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: ${{ matrix.java-version }}
      - name: Unit Tests
        run: ./gradlew connector:test
      - name: Build Bundle
        run: ./gradlew connector:buildConfluentBundle

  e2e:
    runs-on: ubuntu-latest
    needs:
      - format
      - tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"
      - name: E2E Tests
        run: ./gradlew connector:e2e
