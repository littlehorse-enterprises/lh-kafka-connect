name: main
run-name: Publish Snapshot on "${{ github.ref_name }}"
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Get version
        id: get_version
        run: echo "version=$(sed -n 's/^version=//p' gradle.properties)" >> $GITHUB_OUTPUT
      - name: Validate snapshot format
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -i -- '-SNAPSHOT$' >/dev/null; then
            echo "ERROR: version '$VERSION' does not end with -SNAPSHOT" >&2
            exit 1
          fi

  tests:
    needs:
      - prepare
    uses: ./.github/workflows/tests.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  release:
    needs:
      - prepare
      - tests
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"
      - name: Build Bundle
        run: ./gradlew connector:buildConfluentBundle
      - name: Replace Snapshot Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v$VERSION" --yes --cleanup-tag || true
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "Latest snapshot build from ${{ github.ref_name }} (${{ github.sha }})." \
            --prerelease \
            --target "${{ github.sha }}" \
            connector/build/dist/lh-kafka-connect-"$VERSION".zip \
            connector/build/bundle/lh-kafka-connect/manifest.json \
            connector/build/bundle/lh-kafka-connect/lib/lh-kafka-connect-"$VERSION".jar

  docker:
    needs:
      - prepare
      - tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "corretto"
          java-version: "17"
      - name: Build Bundle
        run: ./gradlew connector:buildConfluentBundle
      - name: Build and Publish Strimzi Image
        # Snapshot tag only; the `latest` tag is reserved for stable releases.
        uses: littlehorse-enterprises/publish-image@v1
        with:
          image-name: strimzi
          dockerfile: docker/Dockerfile.strimzi
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tags: |
            type=raw,value=${{ env.VERSION }}
